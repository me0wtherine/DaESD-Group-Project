<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bristol Regional Food Network{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">BRFN</a>
            <ul class="nav-links">
                <li><a href="#">Shop</a></li>
                <li><a href="#">Producers</a></li>
                <li><a href="{% url 'welcome' %}">Login / Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 Bristol Regional Food Network. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
